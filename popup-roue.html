<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roue MarcoMedium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("liRFAyxBo1908cbzF");</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  pointer-events: none;
}

#overlay {
  display: none;
  position: fixed;
  top: 0 !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  background: rgba(6,4,15,0.88);
  z-index: 2147483647;
  align-items: flex-start;
  justify-content: center;
  padding: 12px 16px;
  backdrop-filter: blur(4px);
  pointer-events: all;
  overflow-y: auto;
}
#overlay * {
  pointer-events: all !important;
}
#overlay.on { display: flex; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

#popup {
  background: linear-gradient(135deg, #4a1a6b, #2d0850);
  border: 1px solid rgba(201,168,224,0.3);
  border-radius: 12px;
  padding: 14px 18px;
  max-width: 480px;
  width: 100%;
  position: relative;
  box-shadow: 0 0 60px rgba(100,30,160,0.5);
  animation: popIn 0.55s cubic-bezier(0.22,1,0.36,1);
  margin-top: 4px;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.88) translateY(20px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

#btn-close {
  display: block;
  width: 100%;
  margin-top: 6px;
  padding: 7px;
  background: transparent;
  border: 1px solid rgba(201,168,224,0.3);
  border-radius: 4px;
  color: rgba(201,168,224,0.6);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
}
#btn-close:hover { border-color:#c9a8e0; color:#c9a8e0; }

/* Étoiles */
.stars { text-align:center; font-size:0.8rem; color:rgba(201,168,224,0.4); letter-spacing:0.4em; margin-bottom:2px; }

/* Titre */
.titre {
  font-family:'Cinzel Decorative',cursive;
  font-size:0.95rem;
  color:#c9a8e0; text-align:center;
  text-shadow:0 0 20px rgba(201,168,224,0.4);
  margin-bottom:2px;
}

/* OFFRE EN GRAND */
.offre-grande {
  text-align:center;
  font-family:'Cinzel Decorative',cursive;
  font-size:1.3rem;
  color:#7dcea0;
  text-shadow:0 0 25px rgba(125,206,160,0.5);
  margin: 2px 0 2px;
  line-height:1.2;
}
.offre-petite {
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:0.68rem;
  color:rgba(201,168,224,0.45);
  margin-bottom:6px;
}

/* Layout 2 colonnes */
.layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  align-items: start;
}
@media (max-width:480px) {
  .layout { grid-template-columns:1fr; }
}

/* ── ROUE ── */
.wheel-col { display:flex; flex-direction:column; align-items:center; }
.wheel-wrap {
  position:relative;
  width:200px; height:200px;
  margin-bottom:12px;
}
#roue-canvas {
  border-radius:50%;
  box-shadow:0 0 30px rgba(201,168,224,0.2), 0 0 0 3px rgba(201,168,224,0.15);
}
.arrow {
  position:absolute; top:-14px; left:50%;
  transform:translateX(-50%);
  width:0; height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:18px solid #c9a8e0;
  filter:drop-shadow(0 0 5px rgba(201,168,224,0.6));
}
.wheel-center {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:32px; height:32px;
  border-radius:50%;
  background:linear-gradient(135deg,#c9a8e0,#8a6aaa);
  border:2px solid rgba(255,255,255,0.3);
  display:flex; align-items:center; justify-content:center;
  font-size:1rem;
}

/* ── FORMULAIRE ── */
.form-col {}
.form-col label {
  display:block;
  font-family:'Cinzel Decorative',cursive;
  font-size:0.55rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:#c9a8e0;
  margin-bottom:3px;
  margin-top:6px;
}
.form-col label:first-child { margin-top:0; }
.form-col input {
  width:100%;
  padding:5px 10px;
  background:rgba(6,4,15,0.6);
  border:1px solid rgba(201,168,224,0.25);
  border-radius:4px;
  color:#f0e6ff;
  font-family:'Cormorant Garamond',serif;
  font-size:0.95rem;
  outline:none;
  transition:border-color 0.3s;
}
.form-col input:focus { border-color:#c9a8e0; }

/* Bouton spin */
.btn-spin {
  width:100%;
  margin-top:6px;
  padding:8px;
  background:transparent;
  border:1px solid #c9a8e0;
  border-radius:4px;
  color:#c9a8e0;
  font-family:'Cinzel Decorative',cursive;
  font-size:0.7rem;
  letter-spacing:0.08em;
  cursor:pointer;
  transition:all 0.3s;
}
.btn-spin:hover { background:rgba(201,168,224,0.1); box-shadow:0 0 20px rgba(201,168,224,0.2); }
.btn-spin:disabled { opacity:0.35; cursor:default; }

.err {
  display:none; color:#e08888;
  font-style:italic; font-size:0.8rem;
  text-align:center; margin-top:6px;
  font-family:'Cormorant Garamond',serif;
}
.err.on { display:block; }

.conditions {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:0.68rem;
  color:rgba(201,168,224,0.4);
  text-align:center; margin-top:6px;
  line-height:1.4;
}

/* ── RÉSULTAT ── */
#result-section { display:none; text-align:center; }
.result-icon { font-size:2.8rem; margin-bottom:10px; display:block; }
.result-titre { font-family:'Cinzel Decorative',cursive; font-size:1rem; margin-bottom:8px; }
.result-titre.gagne { color:#7dcea0; text-shadow:0 0 20px rgba(125,206,160,0.4); }
.result-titre.perdu { color:#c9a8e0; }
.result-txt { font-family:'Cormorant Garamond',serif; font-size:0.95rem; font-style:italic; color:rgba(240,230,255,0.85); line-height:1.7; margin-bottom:14px; }

.code-box { background:rgba(6,4,15,0.6); border:1px solid rgba(125,206,160,0.4); border-radius:6px; padding:14px; margin:12px 0; }
.code-lbl { font-family:'Cinzel Decorative',cursive; font-size:0.58rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(125,206,160,0.7); margin-bottom:6px; }
.code-val { font-family:'Cinzel Decorative',cursive; font-size:1.4rem; color:#7dcea0; letter-spacing:0.15em; text-shadow:0 0 12px rgba(125,206,160,0.4); }
.btn-copy { margin-top:8px; padding:7px 18px; background:transparent; border:1px solid rgba(125,206,160,0.4); border-radius:3px; color:rgba(125,206,160,0.8); font-family:'Cormorant Garamond',serif; font-size:0.82rem; cursor:pointer; transition:all 0.3s; }
.btn-copy:hover { background:rgba(125,206,160,0.1); }
.code-cond { font-family:'Cormorant Garamond',serif; font-size:0.72rem; font-style:italic; color:rgba(201,168,224,0.4); margin-top:6px; line-height:1.4; }

.btn-fermer { margin-top:14px; padding:10px 24px; background:transparent; border:1px solid rgba(201,168,224,0.3); border-radius:4px; color:rgba(201,168,224,0.6); font-family:'Cormorant Garamond',serif; font-size:0.9rem; cursor:pointer; transition:all 0.3s; }
.btn-fermer:hover { border-color:#c9a8e0; color:#c9a8e0; }

/* Confettis */
.confetti-wrap { position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:16px; }
.confetti { position:absolute; width:7px; height:7px; border-radius:2px; animation:cfall 1.8s ease-in forwards; }
@keyframes cfall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(400px) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<div id="overlay">
  <div id="popup">

    <div class="confetti-wrap" id="confetti"></div>

    <div class="stars">&#10022; &#10023; &#10022;</div>
    <h2 class="titre">Tentez Votre Chance !</h2>
    <div class="offre-grande">5 Minutes Offertes</div>
    <div class="offre-petite">* Offre valable à l'achat d'une consultation de CHF 20.- minimum</div>

    <!-- FORMULAIRE + ROUE -->
    <div id="main-section">
      <div class="layout">

        <!-- Roue -->
        <div class="wheel-col">
          <div class="wheel-wrap">
            <div class="arrow"></div>
            <canvas id="roue-canvas" width="200" height="200"></canvas>
            <div class="wheel-center">🔮</div>
          </div>
          <p style="font-family:'Cormorant Garamond',serif;font-style:italic;color:rgba(201,168,224,0.5);font-size:0.78rem;text-align:center;">Remplissez le formulaire<br>puis lancez la roue !</p>
        </div>

        <!-- Formulaire -->
        <div class="form-col">
          <label>Prénom</label>
          <input type="text" id="f-prenom" placeholder="Votre prénom...">
          <label>Nom</label>
          <input type="text" id="f-nom" placeholder="Votre nom...">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="votre@email.com">
          <label>Date de naissance</label>
          <input type="date" id="f-ddn">
          <div class="err" id="f-err"></div>
          <button class="btn-spin" id="btn-spin" onclick="lancer()">✧ Lancer la Roue ✧</button>
        </div>

      </div>
      <p class="conditions">✦ 1 participation par jour · Non cumulable · Valable 30 jours</p>
    </div>

    <!-- RÉSULTAT -->
    <div id="result-section"></div>
  </div>
</div>

<script>
(function(){
  var EMAILJS_SERVICE  = "service_8pt08ad";
  var EMAILJS_TEMPLATE = "template_7qvb6yz";
  var STORAGE_KEY = "marco_roue_";

  var SEGMENTS = [
    { label:"Perdu",  gagne:false, color:"#2d0d50" },
    { label:"Gagné!", gagne:true,  color:"#1a4a2e" },
    { label:"Perdu",  gagne:false, color:"#3a1255" },
    { label:"Perdu",  gagne:false, color:"#200840" },
    { label:"Perdu",  gagne:false, color:"#2d0d50" },
    { label:"Gagné!", gagne:true,  color:"#1a4a2e" },
    { label:"Perdu",  gagne:false, color:"#3a1255" },
    { label:"Perdu",  gagne:false, color:"#200840" },
  ];

  var N = SEGMENTS.length;
  var arc = (2 * Math.PI) / N;
  var angle = 0;
  var spinning = false;
  var userData = {};

  function todayKey() {
    var d = new Date();
    return STORAGE_KEY + d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
  }
  function dejaJoue() { return localStorage.getItem(todayKey()) !== null; }
  function marquerJoue(g, c) { localStorage.setItem(todayKey(), JSON.stringify({gagne:g,code:c||""})); }

  // ── Dessiner roue ──
  function dessiner(a) {
    var cv = document.getElementById("roue-canvas");
    var ctx = cv.getContext("2d");
    var cx = cv.width/2, cy = cv.height/2, r = cx - 3;
    ctx.clearRect(0,0,cv.width,cv.height);
    for (var i=0; i<N; i++) {
      var sa = a + i*arc, ea = sa + arc;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,sa,ea); ctx.closePath();
      ctx.fillStyle = SEGMENTS[i].color; ctx.fill();
      ctx.strokeStyle = "rgba(201,168,224,0.25)"; ctx.lineWidth = 1.2; ctx.stroke();
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(sa + arc/2);
      ctx.textAlign = "right";
      ctx.fillStyle = SEGMENTS[i].gagne ? "#7dcea0" : "rgba(201,168,224,0.7)";
      ctx.font = SEGMENTS[i].gagne ? "bold 11px 'Cinzel Decorative',cursive" : "10px 'Cormorant Garamond',serif";
      ctx.fillText(SEGMENTS[i].label, r-8, 4);
      ctx.restore();
    }
  }
  dessiner(angle);

  // ── Lancer ──
  window.lancer = function() {
    if (spinning) return;
    var prenom = document.getElementById("f-prenom").value.trim();
    var nom    = document.getElementById("f-nom").value.trim();
    var email  = document.getElementById("f-email").value.trim();
    var ddn    = document.getElementById("f-ddn").value;
    var err    = document.getElementById("f-err");

    if (!prenom||!nom||!email||!ddn) { err.textContent="Veuillez remplir tous les champs."; err.classList.add("on"); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent="Email invalide."; err.classList.add("on"); return; }
    err.classList.remove("on");
    userData = {prenom:prenom,nom:nom,email:email,ddn:ddn};

    document.getElementById("btn-spin").disabled = true;
    spinning = true;

    var gagne = Math.random() < 0.25;
    var cibles = [];
    for (var i=0;i<N;i++) if(SEGMENTS[i].gagne===gagne) cibles.push(i);
    var cible = cibles[Math.floor(Math.random()*cibles.length)];

    var tours = 5 + Math.floor(Math.random()*3);
    var pointe = -Math.PI/2;
    var cibleAngle = cible*arc + arc/2;
    var totalRot = tours*2*Math.PI + (pointe - cibleAngle - angle);
    while (totalRot < tours*2*Math.PI) totalRot += 2*Math.PI;

    var startAngle = angle;
    var duration = 4500;
    var startTime = null;

    function ease(t) { return 1 - Math.pow(1-t,4); }

    function lireSegment(a) {
      var norm = ((a%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      var pointe2 = (3*Math.PI/2);
      var diff = (pointe2 - norm + 2*Math.PI)%(2*Math.PI);
      return Math.floor(diff/arc)%N;
    }

    function animate(ts) {
      if (!startTime) startTime = ts;
      var p = Math.min((ts-startTime)/duration, 1);
      angle = startAngle + totalRot * ease(p);
      dessiner(angle);
      if (p<1) { requestAnimationFrame(animate); }
      else {
        var segReel = lireSegment(angle);
        var gagneFinal = SEGMENTS[segReel].gagne;
        spinning = false;
        angle = angle % (2*Math.PI);
        afficher(gagneFinal);
      }
    }
    requestAnimationFrame(animate);
  };

  // ── Afficher résultat ──
  function genCode() {
    var c="MARCO-", s="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    for(var i=0;i<6;i++) c+=s[Math.floor(Math.random()*s.length)];
    return c;
  }

  function afficher(gagne) {
    var code = gagne ? genCode() : null;
    marquerJoue(gagne, code);

    // Email
    var now = new Date();
    var dateStr = now.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});
    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      prenom: userData.prenom, nom: userData.nom,
      email: userData.email, ddn: userData.ddn,
      resultat: gagne ? "GAGNE - 5 minutes offertes" : "PERDU",
      code: code||"Aucun", date: dateStr
    }).catch(function(e){console.error(e);});

    // Confettis si gagné
    if (gagne) lancerConfettis();

    document.getElementById("main-section").style.display = "none";
    var res = document.getElementById("result-section");
    res.style.display = "block";

    if (gagne) {
      res.innerHTML =
        "<span class='result-icon'>🎉</span>" +
        "<div class='result-titre gagne'>Félicitations " + userData.prenom + " !</div>" +
        "<p class='result-txt'>Les astres vous sourient ! Vous avez gagné <strong>5 minutes offertes</strong> avec Marco Medium.</p>" +
        "<div class='code-box'>" +
          "<div class='code-lbl'>Votre code cadeau</div>" +
          "<div class='code-val' id='le-code'>" + code + "</div>" +
          "<button class='btn-copy' onclick='copier(\"" + code + "\")'>📋 Copier le code</button>" +
          "<p class='code-cond'>* Valable pour une consultation de CHF 20.- min · Non cumulable · 1 fois</p>" +
        "</div>" +
        "<button class='btn-fermer' onclick='fermer()'>Fermer ✦</button>";
    } else {
      res.innerHTML =
        "<span class='result-icon'>🔮</span>" +
        "<div class='result-titre perdu'>Pas de chance aujourd'hui, " + userData.prenom + "…</div>" +
        "<p class='result-txt'>Les étoiles réservent leur magie pour une prochaine fois. Revenez demain pour retenter votre chance !</p>" +
        "<p style='font-family:\"Cormorant Garamond\",serif;font-style:italic;color:rgba(201,168,224,0.45);font-size:0.82rem;margin-bottom:14px;'>Consultez Marco dès maintenant au CHF 2.-/min.</p>" +
        "<button class='btn-fermer' onclick='fermer()'>Fermer ✦</button>";
    }
  }

  // ── Confettis ──
  function lancerConfettis() {
    var w = document.getElementById("confetti");
    var cols = ["#c9a8e0","#7dcea0","#f0e6ff","#a78bcc","#5dade2"];
    for (var i=0;i<40;i++) {
      (function(i){
        setTimeout(function(){
          var c = document.createElement("div");
          c.className = "confetti";
          c.style.left = Math.random()*100+"%";
          c.style.top = "-10px";
          c.style.background = cols[Math.floor(Math.random()*cols.length)];
          c.style.animationDuration = (1.2+Math.random()*0.8)+"s";
          c.style.animationDelay = (Math.random()*0.4)+"s";
          w.appendChild(c);
          setTimeout(function(){c.remove();},2500);
        },i*35);
      })(i);
    }
  }

  // ── Copier ──
  window.copier = function(code) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(code).then(function(){
        var b=document.querySelector(".btn-copy");
        if(b){b.textContent="✓ Copié !";b.style.color="#7dcea0";}
      });
    }
  };

  // ── Fermer ──
  window.fermer = function() {
    document.getElementById("overlay").classList.remove("on");
    document.getElementById("overlay").style.display = "none";
    document.body.style.pointerEvents = "none";
    document.documentElement.style.pointerEvents = "none";
  };

  // Fermer en cliquant dehors
  document.getElementById("overlay").addEventListener("click", function(e){
    if(e.target===this) fermer();
  });

  // ── Lancement ──
  if (dejaJoue()) {
    document.body.style.pointerEvents = "none";
  } else {
    setTimeout(function(){
      document.body.style.pointerEvents = "all";
      document.getElementById("overlay").classList.add("on");
    }, 3000);
  }

})();
</script>
</body>
</html>
