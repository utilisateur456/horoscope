<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roue MarcoMedium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("liRFAyxBo1908cbzF");</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:transparent;
  overflow:hidden;
}

#overlay {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100vw; height:100vh;
  background:rgba(6,4,15,0.88);
  z-index:2147483647;
  justify-content:center;
  align-items:center;
  padding:20px;
}
#overlay.on { display:flex; }

#popup {
  background:linear-gradient(135deg,#4a1a6b,#2d0850);
  border:1px solid rgba(201,168,224,0.3);
  border-radius:12px;
  padding:16px 20px;
  max-width:480px;
  width:100%;
  max-height:80vh;
  overflow-y:auto;
  box-shadow:0 0 60px rgba(100,30,160,0.5);
  color:#f0e6ff;
  position:relative;
}

/* Croix fermer */
.close-btn {
  position:absolute;
  top:10px; right:14px;
  background:none; border:none;
  color:rgba(201,168,224,0.6);
  font-size:1.4rem;
  cursor:pointer;
  line-height:1;
  z-index:10;
}
.close-btn:hover { color:#c9a8e0; }

.stars { text-align:center; font-size:0.85rem; color:rgba(201,168,224,0.4); letter-spacing:0.4em; margin-bottom:4px; }
.titre { font-family:'Cinzel Decorative',cursive; font-size:0.95rem; color:#c9a8e0; text-align:center; margin-bottom:2px; }
.offre { font-family:'Cinzel Decorative',cursive; font-size:1.3rem; color:#7dcea0; text-align:center; text-shadow:0 0 20px rgba(125,206,160,0.4); margin:4px 0 2px; }
.offre-cond { text-align:center; font-style:italic; font-size:0.68rem; color:rgba(201,168,224,0.4); margin-bottom:10px; }

/* Layout */
.layout { display:grid; grid-template-columns:130px 1fr; gap:12px; align-items:center; }

/* Roue */
.wheel-col { display:flex; flex-direction:column; align-items:center; }
.wheel-wrap { position:relative; width:120px; height:120px; margin-bottom:6px; }
#roue-canvas { border-radius:50%; box-shadow:0 0 20px rgba(201,168,224,0.2); }
.arrow { position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-top:14px solid #c9a8e0; }
.wheel-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:24px; height:24px; border-radius:50%; background:linear-gradient(135deg,#c9a8e0,#8a6aaa); display:flex; align-items:center; justify-content:center; font-size:0.75rem; }
.wheel-hint { font-family:'Cormorant Garamond',serif; font-style:italic; color:rgba(201,168,224,0.5); font-size:0.7rem; text-align:center; line-height:1.3; }

/* Formulaire */
.form-col label { display:block; font-family:'Cinzel Decorative',cursive; font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase; color:#c9a8e0; margin-bottom:3px; margin-top:7px; }
.form-col label:first-child { margin-top:0; }
.form-col input { width:100%; padding:6px 10px; background:rgba(6,4,15,0.7); border:1px solid rgba(201,168,224,0.3); border-radius:4px; color:#f0e6ff; font-family:Georgia,serif; font-size:0.9rem; outline:none; }
.form-col input:focus { border-color:#c9a8e0; }

.err { display:none; color:#e08888; font-style:italic; font-size:0.8rem; margin-top:4px; text-align:center; }
.err.on { display:block; }

.spin-btn { width:100%; margin-top:8px; padding:9px; background:transparent; border:1px solid #c9a8e0; border-radius:4px; color:#c9a8e0; font-family:'Cinzel Decorative',cursive; font-size:0.7rem; letter-spacing:0.1em; cursor:pointer; transition:all .3s; }
.spin-btn:hover { background:rgba(201,168,224,0.1); }
.spin-btn:disabled { opacity:0.35; cursor:default; }

.cond { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.62rem; color:rgba(201,168,224,0.4); text-align:center; margin-top:6px; }

/* Résultat */
#result { display:none; text-align:center; }
.r-icon { font-size:2.5rem; display:block; margin-bottom:8px; }
.r-titre { font-family:'Cinzel Decorative',cursive; font-size:0.95rem; margin-bottom:8px; }
.r-titre.gagne { color:#7dcea0; }
.r-titre.perdu { color:#c9a8e0; }
.r-txt { font-style:italic; font-size:0.95rem; color:rgba(240,230,255,0.85); line-height:1.6; margin-bottom:12px; }
.code-box { background:rgba(6,4,15,0.6); border:1px solid rgba(125,206,160,0.4); border-radius:6px; padding:12px; margin:10px 0; }
.code-lbl { font-family:'Cinzel Decorative',cursive; font-size:0.55rem; letter-spacing:0.15em; color:rgba(125,206,160,0.7); margin-bottom:6px; }
.code-val { font-family:'Cinzel Decorative',cursive; font-size:1.4rem; color:#7dcea0; letter-spacing:0.15em; }
.copy-btn { margin-top:8px; padding:6px 16px; background:transparent; border:1px solid rgba(125,206,160,0.4); border-radius:3px; color:rgba(125,206,160,0.8); font-family:Georgia,serif; font-size:0.8rem; cursor:pointer; }
.code-cond { font-style:italic; font-size:0.7rem; color:rgba(201,168,224,0.4); margin-top:6px; }
.close-result { margin-top:12px; padding:9px 24px; background:transparent; border:1px solid rgba(201,168,224,0.3); border-radius:4px; color:rgba(201,168,224,0.7); font-family:Georgia,serif; font-size:0.85rem; cursor:pointer; }
.close-result:hover { border-color:#c9a8e0; color:#c9a8e0; }

.confetti-wrap { position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:12px; }
.confetti { position:absolute; width:6px; height:6px; border-radius:2px; animation:cfall 1.8s ease-in forwards; }
@keyframes cfall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(400px) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<div id="overlay">
  <div id="popup">
    <button class="close-btn" onclick="fermer()">&#x2715;</button>
    <div class="confetti-wrap" id="confetti"></div>

    <div class="stars">&#10022; &#10023; &#10022;</div>
    <h2 class="titre">Tentez Votre Chance !</h2>
    <div class="offre">5 Minutes Offertes</div>
    <div class="offre-cond">* Offre valable à l'achat d'une consultation de CHF 20.- minimum</div>

    <div id="main-section">
      <div class="layout">
        <div class="wheel-col">
          <div class="wheel-wrap">
            <div class="arrow"></div>
            <canvas id="roue-canvas" width="120" height="120"></canvas>
            <div class="wheel-center">🔮</div>
          </div>
          <p class="wheel-hint">Remplissez<br>puis lancez !</p>
        </div>
        <div class="form-col">
          <label>Prénom</label>
          <input type="text" id="f-prenom" placeholder="Votre prénom...">
          <label>Nom</label>
          <input type="text" id="f-nom" placeholder="Votre nom...">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="votre@email.com">
          <label>Date de naissance</label>
          <input type="date" id="f-ddn">
          <div class="err" id="f-err"></div>
          <button class="spin-btn" id="btn-spin" onclick="lancer()">&#10023; Lancer la Roue &#10023;</button>
        </div>
      </div>
      <p class="cond">&#10022; 1 participation par jour &middot; Non cumulable &middot; Valable 30 jours</p>
    </div>

    <div id="result"></div>
  </div>
</div>

<script>
(function(){
  var SVC  = "service_8pt08ad";
  var TPL  = "template_7qvb6yz";
  var KEY  = "marco_roue_";

  var SEGS = [
    {label:"Perdu", gagne:false, color:"#2d0d50"},
    {label:"Gagné!", gagne:true,  color:"#1a4a2e"},
    {label:"Perdu", gagne:false, color:"#3a1255"},
    {label:"Perdu", gagne:false, color:"#200840"},
    {label:"Perdu", gagne:false, color:"#2d0d50"},
    {label:"Gagné!", gagne:true,  color:"#1a4a2e"},
    {label:"Perdu", gagne:false, color:"#3a1255"},
    {label:"Perdu", gagne:false, color:"#200840"},
  ];
  var N = SEGS.length;
  var arc = 2*Math.PI/N;
  var angle = 0;
  var spinning = false;
  var userData = {};

  function todayKey(){ var d=new Date(); return KEY+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
  function dejaJoue(){ try{ return localStorage.getItem(todayKey())!==null; }catch(e){ return false; } }
  function marquerJoue(g,c){ try{ localStorage.setItem(todayKey(),JSON.stringify({gagne:g,code:c||""})); }catch(e){} }

  function dessiner(a){
    var cv=document.getElementById("roue-canvas");
    var ctx=cv.getContext("2d");
    var cx=cv.width/2,cy=cv.height/2,r=cx-2;
    ctx.clearRect(0,0,cv.width,cv.height);
    for(var i=0;i<N;i++){
      var sa=a+i*arc,ea=sa+arc;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.closePath();
      ctx.fillStyle=SEGS[i].color;ctx.fill();
      ctx.strokeStyle="rgba(201,168,224,0.2)";ctx.lineWidth=1;ctx.stroke();
      ctx.save();ctx.translate(cx,cy);ctx.rotate(sa+arc/2);
      ctx.textAlign="right";
      ctx.fillStyle=SEGS[i].gagne?"#7dcea0":"rgba(201,168,224,0.7)";
      ctx.font=SEGS[i].gagne?"bold 9px sans-serif":"9px sans-serif";
      ctx.fillText(SEGS[i].label,r-6,3);
      ctx.restore();
    }
  }
  dessiner(angle);

  window.lancer = function(){
    if(spinning) return;
    var prenom=document.getElementById("f-prenom").value.trim();
    var nom=document.getElementById("f-nom").value.trim();
    var email=document.getElementById("f-email").value.trim();
    var ddn=document.getElementById("f-ddn").value;
    var err=document.getElementById("f-err");
    if(!prenom||!nom||!email||!ddn){err.textContent="Veuillez remplir tous les champs.";err.classList.add("on");return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent="Email invalide.";err.classList.add("on");return;}
    err.classList.remove("on");
    userData={prenom:prenom,nom:nom,email:email,ddn:ddn};
    document.getElementById("btn-spin").disabled=true;
    spinning=true;

    var gagne=Math.random()<0.25;
    var cibles=[];
    for(var i=0;i<N;i++) if(SEGS[i].gagne===gagne) cibles.push(i);
    var cible=cibles[Math.floor(Math.random()*cibles.length)];
    var tours=5+Math.floor(Math.random()*3);
    var pointe=-Math.PI/2;
    var cibleAngle=cible*arc+arc/2;
    var totalRot=tours*2*Math.PI+(pointe-cibleAngle-angle);
    while(totalRot<tours*2*Math.PI) totalRot+=2*Math.PI;

    var startAngle=angle,duration=4500,startTime=null;
    function ease(t){return 1-Math.pow(1-t,4);}
    function lireSegment(a){
      var norm=((a%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      var diff=(3*Math.PI/2-norm+2*Math.PI)%(2*Math.PI);
      return Math.floor(diff/arc)%N;
    }
    function animate(ts){
      if(!startTime) startTime=ts;
      var p=Math.min((ts-startTime)/duration,1);
      angle=startAngle+totalRot*ease(p);
      dessiner(angle);
      if(p<1){requestAnimationFrame(animate);}
      else{
        var segReel=lireSegment(angle);
        var gagneFinal=SEGS[segReel].gagne;
        spinning=false;
        angle=angle%(2*Math.PI);
        afficher(gagneFinal);
      }
    }
    requestAnimationFrame(animate);
  };

  function genCode(){
    var c="MARCO-",s="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    for(var i=0;i<6;i++) c+=s[Math.floor(Math.random()*s.length)];
    return c;
  }

  function afficher(gagne){
    var code=gagne?genCode():null;
    marquerJoue(gagne,code);
    var now=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
    emailjs.send(SVC,TPL,{
      prenom:userData.prenom,nom:userData.nom,email:userData.email,ddn:userData.ddn,
      resultat:gagne?"GAGNE - 5 minutes offertes":"PERDU",
      code:code||"Aucun",date:now
    }).catch(function(e){console.error(e);});

    if(gagne) confettis();
    document.getElementById("main-section").style.display="none";
    var res=document.getElementById("result");
    res.style.display="block";

    if(gagne){
      res.innerHTML=
        "<span class='r-icon'>🎉</span>"+
        "<div class='r-titre gagne'>Félicitations "+userData.prenom+" !</div>"+
        "<p class='r-txt'>Les astres vous sourient ! Vous avez gagné <strong>5 minutes offertes</strong> avec Marco.</p>"+
        "<div class='code-box'>"+
          "<div class='code-lbl'>Votre code cadeau</div>"+
          "<div class='code-val'>"+code+"</div>"+
          "<button class='copy-btn' onclick='copier(\""+code+"\")'>📋 Copier</button>"+
          "<p class='code-cond'>* Valable pour une consultation de CHF 20.- min · Non cumulable</p>"+
        "</div>"+
        "<button class='close-result' onclick='fermer()'>Fermer ✦</button>";
    } else {
      res.innerHTML=
        "<span class='r-icon'>🔮</span>"+
        "<div class='r-titre perdu'>Pas de chance aujourd'hui, "+userData.prenom+"…</div>"+
        "<p class='r-txt'>Revenez demain pour retenter votre chance ! Vous pouvez consulter Marco dès maintenant au CHF 2.-/min.</p>"+
        "<button class='close-result' onclick='fermer()'>Fermer ✦</button>";
    }
  }

  function confettis(){
    var w=document.getElementById("confetti");
    var cols=["#c9a8e0","#7dcea0","#f0e6ff","#a78bcc","#5dade2"];
    for(var i=0;i<35;i++){
      (function(i){
        setTimeout(function(){
          var c=document.createElement("div");
          c.className="confetti";
          c.style.left=Math.random()*100+"%";
          c.style.top="-10px";
          c.style.background=cols[Math.floor(Math.random()*cols.length)];
          c.style.animationDuration=(1.2+Math.random()*0.8)+"s";
          w.appendChild(c);
          setTimeout(function(){c.remove();},2500);
        },i*40);
      })(i);
    }
  }

  window.copier=function(code){
    if(navigator.clipboard){
      navigator.clipboard.writeText(code).then(function(){
        var b=document.querySelector(".copy-btn");
        if(b){b.textContent="✓ Copié!";b.style.color="#7dcea0";}
      });
    }
  };

  window.fermer=function(){
    document.getElementById("overlay").classList.remove("on");
    document.body.style.pointerEvents="none";
    document.documentElement.style.pointerEvents="none";
  };

  document.getElementById("overlay").addEventListener("click",function(e){
    if(e.target===this) fermer();
  });

  // Lancement
  if(dejaJoue()){
    document.body.style.pointerEvents="none";
    document.documentElement.style.pointerEvents="none";
  } else {
    document.body.style.pointerEvents="none";
    document.documentElement.style.pointerEvents="none";
    setTimeout(function(){
      document.body.style.pointerEvents="all";
      document.documentElement.style.pointerEvents="all";
      document.getElementById("overlay").classList.add("on");
    },3000);
  }
})();
</script>
</body>
</html>
