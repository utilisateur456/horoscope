<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roue de la Fortune – MarcoMedium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("liRFAyxBo1908cbzF");</script>
<style>
/* ══════════════════════════════════
   OVERLAY DE BASE
══════════════════════════════════ */
#marco-popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(6,4,15,0.88);
  z-index: 99999;
  align-items: center;
  justify-content: center;
  padding: 16px;
  backdrop-filter: blur(4px);
  animation: fadeOverlay 0.5s ease;
}
#marco-popup-overlay.visible { display: flex; }
@keyframes fadeOverlay { from{opacity:0} to{opacity:1} }

/* ══════════════════════════════════
   POPUP CARD
══════════════════════════════════ */
#marco-popup {
  background: linear-gradient(135deg, #4a1a6b, #2d0850);
  border: 1px solid rgba(201,168,224,0.3);
  border-radius: 16px;
  padding: 32px 28px;
  max-width: 480px;
  width: 100%;
  position: relative;
  box-shadow: 0 0 80px rgba(100,30,160,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
  animation: popIn 0.55s cubic-bezier(0.22,1,0.36,1);
  max-height: 95vh;
  overflow-y: auto;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.88) translateY(20px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

/* Fermer */
#marco-close {
  position: absolute;
  top: 14px; right: 18px;
  background: none; border: none;
  color: rgba(201,168,224,0.5);
  font-size: 1.4rem;
  cursor: pointer;
  transition: color 0.2s;
  line-height: 1;
}
#marco-close:hover { color: #c9a8e0; }

/* Étoiles déco */
.marco-stars {
  text-align: center;
  font-size: 1.1rem;
  color: rgba(201,168,224,0.4);
  letter-spacing: 0.5em;
  margin-bottom: 8px;
}

/* Titre */
.marco-titre {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(1rem, 4vw, 1.35rem);
  color: #c9a8e0;
  text-align: center;
  margin-bottom: 4px;
  text-shadow: 0 0 20px rgba(201,168,224,0.4);
}
.marco-sous {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: rgba(201,168,224,0.65);
  font-size: 0.95rem;
  margin-bottom: 20px;
}

/* ══════════════════════════════════
   FORMULAIRE
══════════════════════════════════ */
#marco-form-section { }
#marco-form-section label {
  display: block;
  font-family: 'Cinzel Decorative', cursive;
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #c9a8e0;
  margin-bottom: 6px;
  margin-top: 12px;
}
#marco-form-section input {
  width: 100%;
  padding: 11px 14px;
  background: rgba(6,4,15,0.6);
  border: 1px solid rgba(201,168,224,0.25);
  border-radius: 4px;
  color: #f0e6ff;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.3s;
}
#marco-form-section input:focus { border-color: #c9a8e0; }

.marco-conditions {
  margin-top: 14px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
  font-style: italic;
  color: rgba(201,168,224,0.5);
  text-align: center;
  line-height: 1.5;
}

.marco-btn {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  background: transparent;
  border: 1px solid #c9a8e0;
  border-radius: 4px;
  color: #c9a8e0;
  font-family: 'Cinzel Decorative', cursive;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.3s;
}
.marco-btn:hover { background: rgba(201,168,224,0.1); box-shadow: 0 0 20px rgba(201,168,224,0.2); }

.marco-err {
  display: none;
  color: #e08888;
  font-style: italic;
  font-size: 0.85rem;
  text-align: center;
  margin-top: 8px;
}
.marco-err.on { display: block; }

/* ══════════════════════════════════
   ROUE
══════════════════════════════════ */
#marco-wheel-section { display: none; text-align: center; }

.wheel-wrap {
  position: relative;
  width: 260px;
  height: 260px;
  margin: 0 auto 20px;
}

#marco-canvas {
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(201,168,224,0.25), 0 0 0 4px rgba(201,168,224,0.2);
}

/* Flèche indicatrice */
.wheel-arrow {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-top: 22px solid #c9a8e0;
  filter: drop-shadow(0 0 6px rgba(201,168,224,0.6));
}

/* Centre roue */
.wheel-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, #c9a8e0, #8a6aaa);
  border: 3px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  box-shadow: 0 0 15px rgba(201,168,224,0.4);
  cursor: pointer;
}

.marco-spin-btn {
  padding: 13px 36px;
  background: transparent;
  border: 1px solid #c9a8e0;
  border-radius: 4px;
  color: #c9a8e0;
  font-family: 'Cinzel Decorative', cursive;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 8px;
}
.marco-spin-btn:hover { background: rgba(201,168,224,0.1); }
.marco-spin-btn:disabled { opacity: 0.4; cursor: default; }

/* ══════════════════════════════════
   RÉSULTAT
══════════════════════════════════ */
#marco-result-section { display: none; text-align: center; }

.result-icon { font-size: 3rem; margin-bottom: 12px; display: block; }

.result-titre {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 1.1rem;
  margin-bottom: 10px;
}
.result-titre.gagne { color: #7dcea0; text-shadow: 0 0 20px rgba(125,206,160,0.4); }
.result-titre.perdu { color: #c9a8e0; }

.result-txt {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-style: italic;
  color: rgba(240,230,255,0.85);
  line-height: 1.7;
  margin-bottom: 16px;
}

/* Code promo */
.code-box {
  background: rgba(6,4,15,0.6);
  border: 1px solid rgba(125,206,160,0.4);
  border-radius: 6px;
  padding: 16px;
  margin: 16px 0;
}
.code-lbl {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(125,206,160,0.7);
  margin-bottom: 8px;
}
.code-val {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 1.6rem;
  color: #7dcea0;
  letter-spacing: 0.15em;
  text-shadow: 0 0 15px rgba(125,206,160,0.4);
}
.code-copy {
  margin-top: 10px;
  padding: 8px 20px;
  background: transparent;
  border: 1px solid rgba(125,206,160,0.4);
  border-radius: 3px;
  color: rgba(125,206,160,0.8);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s;
}
.code-copy:hover { background: rgba(125,206,160,0.1); }

.code-conditions {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.78rem;
  font-style: italic;
  color: rgba(201,168,224,0.4);
  line-height: 1.5;
  margin-top: 8px;
}

.marco-fermer {
  margin-top: 16px;
  padding: 11px 28px;
  background: transparent;
  border: 1px solid rgba(201,168,224,0.3);
  border-radius: 4px;
  color: rgba(201,168,224,0.6);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
}
.marco-fermer:hover { border-color: #c9a8e0; color: #c9a8e0; }

/* Confettis */
.confetti-wrap {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  border-radius: 16px;
}
.confetti {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 2px;
  animation: confettifall 1.8s ease-in forwards;
}
@keyframes confettifall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(400px) rotate(720deg); opacity: 0; }
}

@media (max-width: 480px) {
  #marco-popup { padding: 24px 18px; }
  .wheel-wrap { width: 220px; height: 220px; }
  #marco-canvas { width: 220px !important; height: 220px !important; }
}
</style>
</head>
<body>

<!-- ══ POPUP ══ -->
<div id="marco-popup-overlay">
  <div id="marco-popup">
    <button id="marco-close" onclick="marcoClose()">&#x2715;</button>
    <div class="confetti-wrap" id="confettiWrap"></div>

    <div class="marco-stars">&#10022; &#10023; &#10022;</div>
    <h2 class="marco-titre">Tentez Votre Chance !</h2>
    <p class="marco-sous">Faites tourner la roue et gagnez 5 minutes offertes avec Marco</p>

    <!-- ÉTAPE 1 : Formulaire -->
    <div id="marco-form-section">
      <label>Prénom</label>
      <input type="text" id="mp-prenom" placeholder="Votre prénom...">
      <label>Nom</label>
      <input type="text" id="mp-nom" placeholder="Votre nom...">
      <label>Email</label>
      <input type="email" id="mp-email" placeholder="votre@email.com">
      <label>Date de naissance</label>
      <input type="date" id="mp-ddn">
      <p class="marco-conditions">
        ✦ 1 participation par jour · Non cumulable · Valable pour une consultation de 10 min minimum (CHF 20.-)
      </p>
      <div class="marco-err" id="mp-err"></div>
      <button class="marco-btn" id="mp-go" onclick="marcoValider()">✧ Faire Tourner la Roue ✧</button>
    </div>

    <!-- ÉTAPE 2 : Roue -->
    <div id="marco-wheel-section">
      <div class="wheel-wrap">
        <div class="wheel-arrow"></div>
        <canvas id="marco-canvas" width="260" height="260"></canvas>
        <div class="wheel-center">🔮</div>
      </div>
      <button class="marco-spin-btn" id="mp-spin" onclick="marcoSpin()">✧ Lancer la Roue ✧</button>
      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;color:rgba(201,168,224,0.5);font-size:0.85rem;">Concentrez-vous et cliquez !</p>
    </div>

    <!-- ÉTAPE 3 : Résultat -->
    <div id="marco-result-section"></div>
  </div>
</div>

<script>
(function(){

  // ══ CONFIG ══
  var SITE = "marcomedium.com";
  var STORAGE_KEY = "marco_roue_";

  // 8 cases : 2 Gagné (indices 1 et 5) / 6 Perdu
  var SEGMENTS = [
    { label: "Perdu",  gagne: false, color: "#2d0d50" },
    { label: "Gagné!", gagne: true,  color: "#1a4a2e" },
    { label: "Perdu",  gagne: false, color: "#3a1255" },
    { label: "Perdu",  gagne: false, color: "#200840" },
    { label: "Perdu",  gagne: false, color: "#2d0d50" },
    { label: "Gagné!", gagne: true,  color: "#1a4a2e" },
    { label: "Perdu",  gagne: false, color: "#3a1255" },
    { label: "Perdu",  gagne: false, color: "#200840" },
  ];

  var N = SEGMENTS.length;
  var arc = (2 * Math.PI) / N;
  var spinning = false;
  var currentAngle = 0;
  var userData = {};

  // ══ VÉRIFICATION 1 FOIS PAR JOUR ══
  function getTodayKey() {
    var d = new Date();
    return STORAGE_KEY + d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
  }

  function aDejaJoue() {
    return localStorage.getItem(getTodayKey()) !== null;
  }

  function marquerJoue(gagne, code) {
    localStorage.setItem(getTodayKey(), JSON.stringify({ gagne: gagne, code: code || "" }));
  }

  // ══ DESSIN ROUE ══
  function dessinerRoue(angle) {
    var canvas = document.getElementById("marco-canvas");
    var ctx = canvas.getContext("2d");
    var cx = canvas.width / 2;
    var cy = canvas.height / 2;
    var r = cx - 4;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < N; i++) {
      var startAngle = angle + i * arc;
      var endAngle = startAngle + arc;

      // Camembert
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = SEGMENTS[i].color;
      ctx.fill();
      ctx.strokeStyle = "rgba(201,168,224,0.3)";
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Texte
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(startAngle + arc / 2);
      ctx.textAlign = "right";
      ctx.fillStyle = SEGMENTS[i].gagne ? "#7dcea0" : "rgba(201,168,224,0.7)";
      ctx.font = SEGMENTS[i].gagne
        ? "bold 13px 'Cinzel Decorative', cursive"
        : "12px 'Cormorant Garamond', serif";
      ctx.fillText(SEGMENTS[i].label, r - 10, 5);
      ctx.restore();
    }

    // Étoiles déco sur les séparateurs
    for (var j = 0; j < N; j++) {
      var a = angle + j * arc;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(a);
      ctx.fillStyle = "rgba(201,168,224,0.4)";
      ctx.font = "10px serif";
      ctx.fillText("✦", r - 6, -4);
      ctx.restore();
    }
  }

  // ══ GÉNÉRATION CODE PROMO ══
  function genererCode() {
    var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    var code = "MARCO-";
    for (var i = 0; i < 6; i++) {
      code += chars[Math.floor(Math.random() * chars.length)];
    }
    return code;
  }

  // ══ VALIDATION FORMULAIRE ══
  window.marcoValider = function() {
    var prenom = document.getElementById("mp-prenom").value.trim();
    var nom    = document.getElementById("mp-nom").value.trim();
    var email  = document.getElementById("mp-email").value.trim();
    var ddn    = document.getElementById("mp-ddn").value;
    var err    = document.getElementById("mp-err");

    if (!prenom || !nom || !email || !ddn) {
      err.textContent = "Veuillez remplir tous les champs.";
      err.classList.add("on");
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      err.textContent = "Email invalide.";
      err.classList.add("on");
      return;
    }

    err.classList.remove("on");
    userData = { prenom: prenom, nom: nom, email: email, ddn: ddn };

    document.getElementById("marco-form-section").style.display = "none";
    document.getElementById("marco-wheel-section").style.display = "block";
    dessinerRoue(currentAngle);
  };

  // ══ SPIN ══
  window.marcoSpin = function() {
    if (spinning) return;
    spinning = true;
    document.getElementById("mp-spin").disabled = true;

    // Déterminer résultat AVANT l'animation
    var gagne = Math.random() < 0.25;

    // Trouver un segment cible correspondant au résultat
    var cibles = [];
    for (var i = 0; i < N; i++) {
      if (SEGMENTS[i].gagne === gagne) cibles.push(i);
    }
    var cible = cibles[Math.floor(Math.random() * cibles.length)];

    // La flèche pointe vers le HAUT = angle -PI/2 dans le repère canvas
    // Pour que le segment cible soit sous la flèche :
    // L'angle de début du segment cible = cible * arc
    // On veut que le milieu du segment soit à -PI/2 (flèche en haut)
    // Donc : currentAngle + totalRotation + cible*arc + arc/2 = -PI/2 + k*2*PI
    var tours = 5 + Math.floor(Math.random() * 3);
    var anglePointe = -Math.PI / 2; // flèche en haut
    var angleCibleMilieu = cible * arc + arc / 2;
    
    // On calcule la rotation totale nécessaire
    var totalRotation = tours * 2 * Math.PI + (anglePointe - angleCibleMilieu - currentAngle);
    // S'assurer que la rotation est positive et suffisamment grande
    while (totalRotation < tours * 2 * Math.PI) {
      totalRotation += 2 * Math.PI;
    }

    var startAngle = currentAngle;
    var duration = 4500;
    var startTime = null;

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function lireSegmentActuel(angle) {
      // Normaliser l'angle
      var a = ((angle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      // La flèche est à -PI/2, soit 3*PI/2 en positif
      var pointeAngle = (3 * Math.PI / 2);
      // Trouver quel segment est sous la flèche
      var diff = (pointeAngle - a + 2 * Math.PI) % (2 * Math.PI);
      var segIndex = Math.floor(diff / arc) % N;
      return segIndex;
    }

    function animate(ts) {
      if (!startTime) startTime = ts;
      var elapsed = ts - startTime;
      var progress = Math.min(elapsed / duration, 1);
      var eased = easeOut(progress);

      currentAngle = startAngle + totalRotation * eased;
      dessinerRoue(currentAngle);

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        // Lire le segment RÉEL sous la flèche
        var segReel = lireSegmentActuel(currentAngle);
        var gagneFinal = SEGMENTS[segReel].gagne;
        currentAngle = currentAngle % (2 * Math.PI);
        spinning = false;
        afficherResultat(gagneFinal);
      }
    }

    requestAnimationFrame(animate);
  };

  // ══ RÉSULTAT ══
  function afficherResultat(gagne) {
    var code = gagne ? genererCode() : null;
    marquerJoue(gagne, code);

    // Envoyer email à Marco
    var now = new Date();
    var dateStr = now.toLocaleDateString("fr-FR", {day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});
    emailjs.send("service_8pt08ad", "template_7qvb6yz", {
      prenom:   userData.prenom,
      nom:      userData.nom,
      email:    userData.email,
      ddn:      userData.ddn,
      resultat: gagne ? "GAGNE - 5 minutes offertes" : "PERDU",
      code:     code || "Aucun",
      date:     dateStr
    }).catch(function(err){ console.error("EmailJS error:", err); });

    document.getElementById("marco-wheel-section").style.display = "none";
    var res = document.getElementById("marco-result-section");
    res.style.display = "block";

    if (gagne) {
      // Confettis !
      lancerConfettis();
      res.innerHTML =
        "<span class='result-icon'>🎉</span>" +
        "<div class='result-titre gagne'>Félicitations " + userData.prenom + " !</div>" +
        "<p class='result-txt'>Les astres vous sourient ! Vous avez gagné <strong>5 minutes offertes</strong> pour votre prochaine consultation avec Marco.</p>" +
        "<div class='code-box'>" +
          "<div class='code-lbl'>Votre code cadeau</div>" +
          "<div class='code-val' id='mp-code'>" + code + "</div>" +
          "<button class='code-copy' onclick='copierCode(\"" + code + "\")'> Copier le code</button>" +
        "</div>" +
        "<p class='code-conditions'>Valable pour une consultation de 10 min minimum (CHF 20.-) · Non cumulable · 1 fois par consultation</p>" +
        "<button class='marco-fermer' onclick='marcoClose()'>Fermer ✦</button>";
    } else {
      res.innerHTML =
        "<span class='result-icon'>🔮</span>" +
        "<div class='result-titre perdu'>Pas de chance aujourd'hui, " + userData.prenom + "…</div>" +
        "<p class='result-txt'>Les étoiles réservent leur magie pour une prochaine fois. Revenez demain pour retenter votre chance !</p>" +
        "<p style='font-family:\"Cormorant Garamond\",serif;font-style:italic;color:rgba(201,168,224,0.5);font-size:0.85rem;margin-bottom:16px;'>Vous pouvez tout de même consulter Marco dès maintenant au CHF 2.-/min.</p>" +
        "<button class='marco-fermer' onclick='marcoClose()'>Fermer ✦</button>";
    }
  }

  // ══ CONFETTIS ══
  function lancerConfettis() {
    var wrap = document.getElementById("confettiWrap");
    var colors = ["#c9a8e0","#7dcea0","#f0e6ff","#a78bcc","#5dade2"];
    for (var i = 0; i < 35; i++) {
      (function(i) {
        setTimeout(function() {
          var c = document.createElement("div");
          c.className = "confetti";
          c.style.left = Math.random() * 100 + "%";
          c.style.top = "-10px";
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDelay = (Math.random() * 0.5) + "s";
          c.style.animationDuration = (1.2 + Math.random() * 1) + "s";
          c.style.transform = "rotate(" + Math.random()*360 + "deg)";
          wrap.appendChild(c);
          setTimeout(function(){ c.remove(); }, 2500);
        }, i * 40);
      })(i);
    }
  }

  // ══ COPIER CODE ══
  window.copierCode = function(code) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(code).then(function(){
        var btn = document.querySelector(".code-copy");
        if (btn) { btn.textContent = "✓ Copié !"; btn.style.color = "#7dcea0"; }
      });
    } else {
      var t = document.createElement("textarea");
      t.value = code; document.body.appendChild(t);
      t.select(); document.execCommand("copy"); document.body.removeChild(t);
      var btn = document.querySelector(".code-copy");
      if (btn) { btn.textContent = "✓ Copié !"; btn.style.color = "#7dcea0"; }
    }
  };

  // ══ FERMER ══
  window.marcoClose = function() {
    document.getElementById("marco-popup-overlay").classList.remove("visible");
    // Désactiver pointer-events sur l'iframe
    window.parent.postMessage('marco-popup-hide', '*');
  };

  // Fermer en cliquant dehors
  document.getElementById("marco-popup-overlay").addEventListener("click", function(e) {
    if (e.target === this) marcoClose();
  });

  // ══ LANCEMENT AUTOMATIQUE ══
  function lancerPopup() {
    if (aDejaJoue()) return; // Déjà joué aujourd'hui
    document.getElementById("marco-popup-overlay").classList.add("visible");
  }

  // Apparition après 3 secondes
  setTimeout(function() {
    if (!aDejaJoue()) {
      // Activer pointer-events sur l'iframe
      window.parent.postMessage('marco-popup-show', '*');
      lancerPopup();
    }
  }, 3000);

})();
</script>
</body>
</html>
