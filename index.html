<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horoscope – MarcoMedium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #3d1560;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    padding: 40px 20px;
  }
  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    .card { padding: 24px 16px !important; }
    .period-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .domains { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .res-sign { font-size: 2rem !important; }
    .res-name { font-size: 0.85rem !important; }
    .horo-txt { font-size: 1rem !important; }
    .conseil-txt { font-size: 0.95rem !important; }
    select, input[type=text] { font-size: 1rem !important; padding: 12px 14px !important; }
    .submit-btn { font-size: 0.8rem !important; padding: 15px !important; }
  }
  .card {
    background: linear-gradient(135deg, #4a1a6b, #3a1255);
    border: 1px solid rgba(201,168,224,0.3);
    border-radius: 8px;
    padding: 44px 40px;
    max-width: 660px;
    margin: 0 auto;
    color: #f0e6ff;
    box-shadow: 0 0 60px rgba(100,30,160,0.3);
  }
  .ornament { text-align:center; font-size:1.4rem; color:rgba(201,168,224,0.5); letter-spacing:0.6em; margin-bottom:32px; }
  label { display:block; font-family:'Cinzel Decorative',cursive; font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; color:#c9a8e0; margin-bottom:10px; }
  select, input[type=text] {
    width:100%; padding:15px 18px;
    background:rgba(30,5,60,0.6);
    border:1px solid rgba(201,168,224,0.3);
    border-radius:4px; color:#f0e6ff;
    font-family:Georgia,serif; font-size:1.1rem;
    outline:none; appearance:none; -webkit-appearance:none;
    margin-bottom:24px; transition:border-color .3s;
  }
  select:focus, input:focus { border-color:#c9a8e0; }
  select option { background:#3a1255; }
  .period-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
  .pbtn { padding:15px 8px; background:rgba(30,5,60,0.6); border:1px solid rgba(201,168,224,0.25); border-radius:4px; color:rgba(201,168,224,0.7); font-family:Georgia,serif; font-size:1.05rem; cursor:pointer; text-align:center; transition:all .3s; }
  .pbtn.active { background:rgba(201,168,224,0.15); border-color:#c9a8e0; color:#c9a8e0; }
  .divider { display:flex; align-items:center; gap:12px; margin:28px 0; color:rgba(201,168,224,0.4); }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,224,.3),transparent); }
  .submit-btn { width:100%; padding:18px; background:transparent; border:1px solid #c9a8e0; border-radius:4px; color:#c9a8e0; font-family:'Cinzel Decorative',cursive; font-size:0.95rem; letter-spacing:.15em; cursor:pointer; transition:all .4s; }
  .submit-btn:hover { background:rgba(201,168,224,0.1); box-shadow:0 0 25px rgba(201,168,224,0.2); }
  .loading { display:none; text-align:center; padding:40px 0; }
  .ball { font-size:3.2rem; display:block; margin-bottom:16px; animation:float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .load-txt { font-style:italic; color:rgba(201,168,224,0.7); font-size:1.1rem; animation:fade 1.5s ease-in-out infinite; }
  @keyframes fade { 0%,100%{opacity:.4} 50%{opacity:1} }
  .erreur { display:none; padding:14px 16px; margin-top:14px; border:1px solid rgba(220,80,80,.4); border-radius:4px; background:rgba(220,80,80,.07); color:#e08888; font-style:italic; font-size:1.05rem; }
  .result { display:none; margin-top:28px; animation:reveal .7s ease; }
  @keyframes reveal { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .res-head { display:flex; align-items:center; gap:16px; margin-bottom:22px; }
  .res-sign { font-size:3rem; }
  .res-name { font-family:'Cinzel Decorative',cursive; font-size:1.2rem; color:#c9a8e0; }
  .res-period { font-style:italic; color:rgba(201,168,224,0.6); font-size:1rem; margin-top:4px; }
  .horo-txt { font-size:1.15rem; line-height:1.9; font-style:italic; border-left:2px solid rgba(201,168,224,0.3); padding-left:20px; margin-bottom:24px; color:#f0e6ff; }
  .domains { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
  .dom { background:rgba(30,5,60,0.5); border:1px solid rgba(201,168,224,0.2); border-radius:6px; padding:16px 10px; text-align:center; }
  .dom-icon { font-size:1.4rem; display:block; margin-bottom:8px; }
  .dom-name { font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:rgba(201,168,224,0.6); margin-bottom:8px; font-family:'Cinzel Decorative',cursive; }
  .dom-stars { color:#c9a8e0; font-size:0.8rem; }
  .conseil { padding:20px; border:1px solid rgba(201,168,224,0.2); border-radius:6px; text-align:center; margin-bottom:24px; }
  .conseil-lbl { font-size:0.72rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(201,168,224,0.5); font-family:'Cinzel Decorative',cursive; }
  .conseil-txt { margin-top:10px; font-style:italic; color:rgba(201,168,224,0.9); font-size:1.1rem; line-height:1.7; }
  .retry { display:block; margin:0 auto; padding:12px 32px; background:transparent; border:1px solid rgba(201,168,224,0.3); border-radius:4px; color:rgba(201,168,224,0.7); font-family:Georgia,serif; cursor:pointer; transition:all .3s; font-size:1rem; letter-spacing:.1em; }
  .retry:hover { border-color:#c9a8e0; color:#c9a8e0; }
</style>
</head>
<body>
<div class="card">
  <div class="ornament">&#10022; &#10023; &#10022;</div>
  <h1 style="text-align:center;font-family:'Cinzel Decorative',cursive;font-size:1.5rem;color:#c9a8e0;margin-bottom:8px;text-shadow:0 0 20px rgba(201,168,224,0.4);">L&#39;Horoscope</h1>
  <p style="text-align:center;font-style:italic;color:rgba(201,168,224,0.7);font-size:1.1rem;margin-bottom:32px;">D&#233;couvrez votre horoscope personnalis&#233; du jour ou de la semaine.</p>
  <div id="mh-form">
    <label>Votre Signe Zodiacal</label>
    <select id="mh-sign">
      <option value="" disabled selected>&#8212; Choisissez votre signe &#8212;</option>
      <option value="Belier|Feu">&#9800; Belier (21 mars &#8211; 19 avril)</option>
      <option value="Taureau|Terre">&#9801; Taureau (20 avril &#8211; 20 mai)</option>
      <option value="Gemeaux|Air">&#9802; Gemeaux (21 mai &#8211; 20 juin)</option>
      <option value="Cancer|Eau">&#9803; Cancer (21 juin &#8211; 22 juillet)</option>
      <option value="Lion|Feu">&#9804; Lion (23 juillet &#8211; 22 aout)</option>
      <option value="Vierge|Terre">&#9805; Vierge (23 aout &#8211; 22 sept.)</option>
      <option value="Balance|Air">&#9806; Balance (23 sept. &#8211; 22 oct.)</option>
      <option value="Scorpion|Eau">&#9807; Scorpion (23 oct. &#8211; 21 nov.)</option>
      <option value="Sagittaire|Feu">&#9808; Sagittaire (22 nov. &#8211; 21 dec.)</option>
      <option value="Capricorne|Terre">&#9809; Capricorne (22 dec. &#8211; 19 janv.)</option>
      <option value="Verseau|Air">&#9810; Verseau (20 janv. &#8211; 18 fev.)</option>
      <option value="Poissons|Eau">&#9811; Poissons (19 fev. &#8211; 20 mars)</option>
    </select>
    <label>Votre Prenom <span style="color:rgba(201,168,224,0.5);font-size:.65rem;">(optionnel)</span></label>
    <input type="text" id="mh-prenom" placeholder="Pour une lecture personnalisee...">
    <label>Periode de la Lecture</label>
    <div class="period-row">
      <button class="pbtn active" id="btn-jour">&#9728; Aujourd&#39;hui</button>
      <button class="pbtn" id="btn-semaine">&#9790; Cette semaine</button>
    </div>
    <div class="divider">&#10022;</div>
    <button class="submit-btn" id="mh-submit">&#10023; Reveler Mon Horoscope &#10023;</button>
  </div>
  <div class="erreur" id="mh-err"></div>
  <div class="loading" id="mh-load">
    <span class="ball">&#128302;</span>
    <p class="load-txt" id="mh-load-txt">Les astres s&#39;alignent pour vous...</p>
  </div>
  <div class="result" id="mh-result"></div>
</div>
<script>
(function(){
  var WORKER = "https://super-band-24a0.marcomedium-com.workers.dev";
  var EMOJIS = {"Belier":"&#9800;","Taureau":"&#9801;","Gemeaux":"&#9802;","Cancer":"&#9803;","Lion":"&#9804;","Vierge":"&#9805;","Balance":"&#9806;","Scorpion":"&#9807;","Sagittaire":"&#9808;","Capricorne":"&#9809;","Verseau":"&#9810;","Poissons":"&#9811;"};
  var MSGS = ["Les astres s alignent pour vous...","Marco consulte les etoiles...","L univers prepare votre message...","Les planetes revelent leurs secrets..."];
  var periode = "jour", loadT;

  document.getElementById("btn-jour").addEventListener("click", function(){ periode="jour"; document.getElementById("btn-jour").classList.add("active"); document.getElementById("btn-semaine").classList.remove("active"); });
  document.getElementById("btn-semaine").addEventListener("click", function(){ periode="semaine"; document.getElementById("btn-semaine").classList.add("active"); document.getElementById("btn-jour").classList.remove("active"); });

  document.getElementById("mh-submit").addEventListener("click", function(){
    document.getElementById("mh-err").style.display = "none";
    var signVal = document.getElementById("mh-sign").value;
    var prenom = document.getElementById("mh-prenom").value.trim();
    if(!signVal){ var e=document.getElementById("mh-err"); e.textContent="Veuillez choisir votre signe zodiacal."; e.style.display="block"; return; }
    var parts=signVal.split("|"), signName=parts[0], element=parts[1];
    var emoji=EMOJIS[signName]||"&#10022;";
    var today=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    var periodeTitle=periode==="jour"?"Horoscope du jour - "+today:"Horoscope de la semaine";
    document.getElementById("mh-form").style.display="none";
    document.getElementById("mh-load").style.display="block";
    var idx=0;
    loadT=setInterval(function(){ idx=(idx+1)%MSGS.length; document.getElementById("mh-load-txt").textContent=MSGS[idx]; },1800);
    fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({signName:signName,element:element,prenom:prenom,periode:periode})})
    .then(function(res){ return res.json().then(function(d){ return {ok:res.ok,data:d.data}; }); })
    .then(function(r){
      clearInterval(loadT);
      document.getElementById("mh-load").style.display="none";
      if(!r.ok||r.data.error) throw new Error(r.data.error||"Erreur");
      var h=r.data;
      function stars(n){ n=Math.min(5,Math.max(1,parseInt(n)||3)); return "&#9733;".repeat(n)+"&#9734;".repeat(5-n); }
      var result=document.getElementById("mh-result");
      result.innerHTML=
        "<div class='res-head'><div class='res-sign'>"+emoji+"</div><div><div class='res-name'>"+(prenom?prenom+" &middot; ":"")+signName+"</div><div class='res-period'>"+periodeTitle+"</div></div></div>"+
        "<p class='horo-txt'>"+h.texte+"</p>"+
        "<div class='domains'>"+
          "<div class='dom'><span class='dom-icon'>&#128149;</span><div class='dom-name'>Amour</div><div class='dom-stars'>"+stars(h.amour)+"</div></div>"+
          "<div class='dom'><span class='dom-icon'>&#9889;</span><div class='dom-name'>Travail</div><div class='dom-stars'>"+stars(h.travail)+"</div></div>"+
          "<div class='dom'><span class='dom-icon'>&#127808;</span><div class='dom-name'>Chance</div><div class='dom-stars'>"+stars(h.chance)+"</div></div>"+
        "</div>"+
        "<div class='conseil'><div class='conseil-lbl'>Message de Marco</div><p class='conseil-txt'>"+h.conseil+"</p></div>"+
        "<button class='retry' id='mh-retry'>&#10022; Nouvelle Lecture &#10022;</button>";
      result.style.display="block";
      document.getElementById("mh-retry").addEventListener("click",function(){ result.style.display="none"; document.getElementById("mh-form").style.display="block"; });
    })
    .catch(function(err){ clearInterval(loadT); document.getElementById("mh-load").style.display="none"; document.getElementById("mh-form").style.display="block"; var e=document.getElementById("mh-err"); e.textContent="Les astres sont troubles : "+err.message; e.style.display="block"; });
  });
})();
</script>

<script>
// Auto-resize pour iframe parent
function sendHeight() {
  var h = document.documentElement.scrollHeight || document.body.scrollHeight;
  window.parent.postMessage({ iframeHeight: h }, '*');
}
window.addEventListener('load', sendHeight);
window.addEventListener('resize', sendHeight);
// Observer les changements de contenu
var obs = new MutationObserver(sendHeight);
obs.observe(document.body, { childList: true, subtree: true, attributes: true });
</script>
</body>
</html>
